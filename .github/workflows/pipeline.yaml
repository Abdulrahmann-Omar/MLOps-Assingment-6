name: Assignment 6 Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lightweight lint check
        run: |
          echo "Running lightweight lint checks..."
          echo "No-op lint passed."
          echo "Lint job passed."

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: ${{ needs.linter.result == 'success' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run expensive training
        run: |
          echo "Starting expensive GPU-like training job..."
          echo "Training completed successfully."

      - name: Create failure logs
        if: ${{ failure() }}
        run: |
          echo "Training failed at $(date -u)" > error_logs.txt
          echo "Repository: $GITHUB_REPOSITORY" >> error_logs.txt
          echo "Branch ref: $GITHUB_REF" >> error_logs.txt
          echo "Commit: $GITHUB_SHA" >> error_logs.txt

      - name: Upload failure artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      - name: Cleanup temporary volumes
        if: ${{ always() }}
        run: echo "Cleaning up temporary cloud volumes..."
